<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meshy2 - Map Editor</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        #grid { display: grid; grid-template-columns: repeat(40, 15px); gap: 1px; background: #333; padding: 1px; border: 2px solid #555; }
        .cell { width: 15px; height: 15px; background: #222; cursor: pointer; }
        .cell:hover { background: #444; }
        .cell.base { background: #0088ff; box-shadow: inset 0 0 5px #00ffff; }
        .cell.player { background: #00ff00; box-shadow: inset 0 0 5px #00ff00; }
        .cell.obstacle { background: #ff5500; }
        #toolbar { margin-bottom: 20px; display: flex; gap: 10px; }
        .tool { padding: 10px 20px; background: #444; color: white; border: none; cursor: pointer; border-radius: 4px; border-bottom: 3px solid transparent; }
        .tool.active { border-color: #00ffff; background: #555; }
        #save-btn { padding: 10px 40px; background: #0088ff; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 20px; }
        #save-btn:hover { background: #0099ff; }
        .info { margin-top: 10px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <h2>MAP EDITOR</h2>
    <div id="toolbar">
        <button class="tool active" data-type="player">Player Start (Green)</button>
        <button class="tool" data-type="base">Base (Blue)</button>
        <button class="tool" data-type="obstacle">Obstacle (Orange)</button>
        <button class="tool" data-type="empty">Clear</button>
    </div>
    <div id="grid"></div>
    <button id="save-btn">SAVE MAP</button>
    <div class="info">Grid represents 40x40 area around the world origin.</div>
    <script type="module" src="/src/editor.js"></script>
</body>
</html>
